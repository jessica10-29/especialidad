
name: Deploy to InfinityFree

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build secure/config.php from secrets
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path

          required = ["DB_HOST", "DB_USER", "DB_PASS", "DB_NAME"]
          missing = [key for key in required if not os.getenv(key, "").strip()]
          if missing:
              raise SystemExit(f"Faltan secretos obligatorios para BD: {', '.join(missing)}")

          host = os.getenv("DB_HOST", "").strip()
          if host.isdigit():
              raise SystemExit(f"DB_HOST parece inválido: {host}")

          config = {
              "DB_HOST": host,
              "DB_PORT": os.getenv("DB_PORT", "3306").strip() or "3306",
              "DB_USER": os.getenv("DB_USER", "").strip(),
              "DB_PASS": os.getenv("DB_PASS", ""),
              "DB_NAME": os.getenv("DB_NAME", "").strip(),
          }

          def php_string(value: str) -> str:
              return "'" + value.replace("\\", "\\\\").replace("'", "\\'") + "'"

          lines = [
              "<?php",
              "// Archivo generado en deploy; contiene las credenciales directamente.",
              "return [",
          ]
          for key, value in config.items():
              lines.append(f"    {php_string(key)} => {php_string(value)},")
          lines.append("];")

          Path("secure").mkdir(parents=True, exist_ok=True)
          Path("secure/config.php").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          DB_NAME: ${{ secrets.DB_NAME }}

      - name: Build secure/mail.php from secrets
        run: |
          mkdir -p secure
          cat > secure/mail.php <<PHP
          <?php
          // Generado en deploy: credenciales SMTP incrustadas
          return [
              'SMTP_HOST' => '${SMTP_HOST}',
              'SMTP_PORT' => '${SMTP_PORT}',
              'SMTP_SECURE' => '${SMTP_SECURE}',
              'SMTP_USER' => '${SMTP_USER}',
              'SMTP_PASS' => '${SMTP_PASS}',
              'FROM_EMAIL' => '${FROM_EMAIL}',
              'FROM_NAME'  => '${FROM_NAME}',
              'SMTP_DEBUG' => 0,
              'TIMEOUT'    => 30,
          ];
          PHP
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          FROM_NAME: ${{ secrets.FROM_NAME }}

      - name: Add secure/.htaccess
        run: |
          mkdir -p secure
          echo "Deny from all" > secure/.htaccess

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: htdocs/
          dangerous-clean-slate: true
          timeout: 86400000
          log-level: standard
          exclude: |
            .git*
            .github/**
            logs/**
